name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, typecheck, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Placeholder values for turbo globalEnv — override via GitHub Secrets when
    # you need real credentials in CI (e.g. integration tests).
    env:
      CI: true
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      CLERK_SECRET_KEY: sk_test_ci_placeholder
      EXPO_PUBLIC_API_URL: http://localhost:3000
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
      MC_API_KEY: ci-placeholder
      MC_LIST_ID: ci-placeholder
      # Turborepo Remote Cache (optional — see README "Continuous integration")
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint, typecheck, build, and test
        run: pnpm turbo run lint check-types build test
